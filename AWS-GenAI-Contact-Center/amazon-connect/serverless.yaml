service: ${env:service}

provider:
  name: aws
  region: ${env:region}
  runtime: nodejs18.x
  endpointType: REGIONAL
  stage: ${env:stage}
  versionFunctions: false
  logRetentionInDays: 60
  deploymentBucket:
    name: ${env:deploymentBucket}
  deploymentPrefix: applications/${self:service}
  stackName: ${env:stage}-${self:service}-2
  apiGateway:
    shouldStartNameWithService: true

custom:

  deployVersion: ${env:deployVersion, '1.0.0 initial release'}

package:
  individually: false
  excludeDevDependencies: true
  patterns:
    - '!*/**'
    - '!*'
    - 'src/lambda/**'
    - 'src/utils/**'
    - 'node_modules/**'

functions:

  startstreaming:
    handler: src/lambda/StartStreaming.handler
    name: '${self:provider.stage}-${self:service}-start-streaming'
    description: 'Handles starting streaming by dropping an SQS message'
    role: StartStreamingRole
    memorySize: 256
    timeout: 7
    environment:
      REGION: '${self:provider.region}'
      STAGE: '${self:provider.stage}'
      SQS_QUEUE_URL: !Ref ProcessQueue
    
  processstream:
    handler: src/lambda/ProcessStream.handler
    name: '${self:provider.stage}-${self:service}-process-stream'
    description: 'Handles listening on a KVS stream and transcribing'
    role: ProcessStreamRole
    memorySize: 256
    timeout: 30
    environment:
      REGION: '${self:provider.region}'
      STAGE: '${self:provider.stage}'
      WHISPER_ENDPOINT: ${env:whisperEndPoint}
      TRANSCRIPTS_TABLE: !Ref TranscriptsTable
      MESSAGES_TABLE: !Ref MessagesTable
      NEXT_MESSAGE_TABLE: !Ref NextMessageTable
      BEDROCK_REGION: ${env:bedrockRegion}
    events:
      - sqs:
          arn: !GetAtt ProcessQueue.Arn
          batchSize: 1

  virtualagent:
    handler: src/lambda/VirtualAgent.handler
    name: '${self:provider.stage}-${self:service}-virtual-agent'
    description: 'Virtual agent fetching data from DynamoDB'
    role: VirtualAgentRole
    memorySize: 256
    timeout: 7
    environment:
      REGION: '${self:provider.region}'
      STAGE: '${self:provider.stage}'
      NEXT_MESSAGE_TABLE: !Ref NextMessageTable

resources:
  Description: 'Connect Voice - ${self:provider.stage}'
  Resources:

    # Table for transcripts
    TranscriptsTable:
      Type: 'AWS::DynamoDB::Table'
      Properties:
        TableName: '${self:provider.stage}-${self:service}-transcripts'
        AttributeDefinitions:
          - AttributeName: contactId
            AttributeType: S
          - AttributeName: transcriptId
            AttributeType: S
        KeySchema:
          - AttributeName: contactId
            KeyType: HASH
          - AttributeName: transcriptId
            KeyType: RANGE
        BillingMode: PAY_PER_REQUEST

    # Table for messages
    MessagesTable:
      Type: 'AWS::DynamoDB::Table'
      Properties:
        TableName: '${self:provider.stage}-${self:service}-messages'
        AttributeDefinitions:
          - AttributeName: contactId
            AttributeType: S
          - AttributeName: messageId
            AttributeType: S
        KeySchema:
          - AttributeName: contactId
            KeyType: HASH
          - AttributeName: messageId
            KeyType: RANGE
        BillingMode: PAY_PER_REQUEST

    # Table for for the next message and action
    NextMessageTable:
      Type: 'AWS::DynamoDB::Table'
      Properties:
        TableName: '${self:provider.stage}-${self:service}-nextmessage'
        AttributeDefinitions:
          - AttributeName: contactId
            AttributeType: S
        KeySchema:
          - AttributeName: contactId
            KeyType: HASH
        BillingMode: PAY_PER_REQUEST

    # IAM Role for StartStreaming Lambda - only needs SQS and CloudWatch Logs
    StartStreamingRole:
      Type: 'AWS::IAM::Role'
      Properties:
        RoleName: '${self:provider.stage}-${self:service}-${self:provider.region}-startstreaming-role'
        Description: 'Lambda execution role for StartStreaming'
        AssumeRolePolicyDocument:
          Version: '2012-10-17'
          Statement:
            - Effect: 'Allow'
              Principal:
                Service:
                  - 'lambda.amazonaws.com'
              Action:
                - 'sts:AssumeRole'
        Policies:
          - PolicyName: StartStreamingPolicy
            PolicyDocument:
              Version: '2012-10-17'
              Statement:
                - Effect: Allow
                  Action:
                    - logs:CreateLogGroup
                    - logs:CreateLogStream
                    - logs:PutLogEvents
                  Resource:
                    - 'arn:aws:logs:${self:provider.region}:${env:accountNumber}:log-group:/aws/lambda/${self:provider.stage}-${self:service}-start-streaming:*'
                - Effect: Allow
                  Action:
                    - sqs:SendMessage
                  Resource: !GetAtt ProcessQueue.Arn

    # IAM Role for ProcessStream Lambda - needs DynamoDB, SQS, SageMaker, Bedrock, KinesisVideo
    ProcessStreamRole:
      Type: 'AWS::IAM::Role'
      Properties:
        RoleName: '${self:provider.stage}-${self:service}-${self:provider.region}-processstream-role'
        Description: 'Lambda execution role for ProcessStream'
        AssumeRolePolicyDocument:
          Version: '2012-10-17'
          Statement:
            - Effect: 'Allow'
              Principal:
                Service:
                  - 'lambda.amazonaws.com'
              Action:
                - 'sts:AssumeRole'
        Policies:
          - PolicyName: ProcessStreamPolicy
            PolicyDocument:
              Version: '2012-10-17'
              Statement:
                - Effect: Allow
                  Action:
                    - logs:CreateLogGroup
                    - logs:CreateLogStream
                    - logs:PutLogEvents
                  Resource:
                    - 'arn:aws:logs:${self:provider.region}:${env:accountNumber}:log-group:/aws/lambda/${self:provider.stage}-${self:service}-process-stream:*'
                - Effect: Allow
                  Action:
                    - dynamodb:PutItem
                    - dynamodb:Query
                    - dynamodb:GetItem
                  Resource:
                    - !GetAtt TranscriptsTable.Arn
                    - !GetAtt MessagesTable.Arn
                    - !GetAtt NextMessageTable.Arn
                - Effect: Allow
                  Action:
                    - sqs:ReceiveMessage
                    - sqs:DeleteMessage
                    - sqs:GetQueueAttributes
                  Resource: !GetAtt ProcessQueue.Arn
                - Effect: Allow
                  Action:
                    - sagemaker:InvokeEndpoint
                  Resource:
                    - arn:aws:sagemaker:${self:provider.region}:${env:accountNumber}:endpoint/${env:whisperEndPoint}
                - Effect: Allow
                  Action:
                    - bedrock:InvokeModel
                  Resource:
                    - 'arn:aws:bedrock:${env:bedrockRegion}::foundation-model/anthropic.claude-3-haiku-20240307-v1:0'
                - Effect: Allow
                  Action:
                    - kinesisvideo:GetDataEndpoint
                    - kinesisvideo:GetMedia
                  Resource:
                    - arn:aws:kinesisvideo:${self:provider.region}:${env:accountNumber}:stream/${self:provider.stage}-${self:service}-*

    # IAM Role for VirtualAgent Lambda - only needs DynamoDB read/delete and CloudWatch Logs
    VirtualAgentRole:
      Type: 'AWS::IAM::Role'
      Properties:
        RoleName: '${self:provider.stage}-${self:service}-${self:provider.region}-virtualagent-role'
        Description: 'Lambda execution role for VirtualAgent'
        AssumeRolePolicyDocument:
          Version: '2012-10-17'
          Statement:
            - Effect: 'Allow'
              Principal:
                Service:
                  - 'lambda.amazonaws.com'
              Action:
                - 'sts:AssumeRole'
        Policies:
          - PolicyName: VirtualAgentPolicy
            PolicyDocument:
              Version: '2012-10-17'
              Statement:
                - Effect: Allow
                  Action:
                    - logs:CreateLogGroup
                    - logs:CreateLogStream
                    - logs:PutLogEvents
                  Resource:
                    - 'arn:aws:logs:${self:provider.region}:${env:accountNumber}:log-group:/aws/lambda/${self:provider.stage}-${self:service}-virtual-agent:*'
                - Effect: Allow
                  Action:
                    - dynamodb:GetItem
                    - dynamodb:Query
                    - dynamodb:DeleteItem
                  Resource:
                    - !GetAtt NextMessageTable.Arn

    ProcessQueue:
      Type: AWS::SQS::Queue
      Properties:
        MaximumMessageSize: 1024
        MessageRetentionPeriod: 1209600
        QueueName: !Sub '${self:provider.stage}-${self:service}-process'
        VisibilityTimeout: 1000
        RedrivePolicy:
          deadLetterTargetArn: !GetAtt ProcessRedriveQueue.Arn
          maxReceiveCount: 1

    ProcessRedriveQueue:
      Type: AWS::SQS::Queue
      Properties:
        MaximumMessageSize: 1024
        MessageRetentionPeriod: 1209600
        QueueName: !Sub '${self:provider.stage}-${self:service}-process-redrive'
        VisibilityTimeout: 120